version: 1

# Parse-time LLM (used by `sponsio scan` to turn code/docs into
# contracts).  Offline & one-shot — favour accuracy over latency.
extractor:
  provider: gemini
  model: gemini-2.5-flash-lite
  api_key: ${GOOGLE_API_KEY}

# Runtime sto-judge (evaluates stochastic atoms like `injection_free`)
# on the agent's hot path.  Favour cheap+fast model; fault tolerance
# matters because LLM outages must NOT cascade into agent outages.
judge:
  provider: gemini
  model: gemini-2.5-flash-lite
  api_key: ${GOOGLE_API_KEY}
  fallback_mode: allow  # allow|deny|skip on judge failure
  circuit_breaker: true

defaults:
  mode: observe  # observe|enforce — observe = shadow (safe default)

tools:
  - name: user_instruction
    description: "Record a user instruction / system-level directive."
    params: "message: str"
  - name: connect_db
    description: "Open a connection to a named database environment."
    params: "database: str"
  - name: read_file
    description: "Read a source file into the agent's working context."
    params: "path: str"
  - name: edit_file
    description: "Apply a unified-diff change to a file."
    params: "path: str, diff: str"
  - name: run_tests
    description: "Run a named test suite."
    params: "suite: str"
  - name: execute_sql
    description: "Execute a SQL query against the currently-connected database."
    params: "query: str"
  - name: escalate_to_human
    description: "Page a human on-call for manual review."
    params: "summary: str"
  - name: generate_status_report
    description: "Write the session's status report to the team channel."
    params: "summary: str"

agents:
  agent:
    # Project root — resolves the `<workspace>/` placeholder
    # used by the filesystem pack rules below.  Edit if your
    # agent runs from a different directory at deploy time.
    workspace: "/Users/yifengxiao/Documents/Sponsio/examples/demo/onboard/freeze_langgraph"

    # Maps the packs' canonical tool names onto the names your
    # codebase actually uses.  Pre-populated from the scanned
    # tool inventory; remove an entry if it's wrong.
    tool_rename:
      read: read_file
      edit: edit_file

    # Auto-selected contract packs.  Each pack ships a curated set
    # of rules; use `overrides:` below to disable individual ones
    # without forking the pack.
    include:
      - sponsio:core/universal  # universal: applies to every LLM agent
      - sponsio:capability/filesystem  # filesystem: tools resemble file IO (read->read_file, edit->edit_file)

    contracts:
      - E:  # confidence: 0.50
          pattern: arg_blacklist
          args: [read_file, path, ["\\.\\./", "~/\\.ssh/", "^/etc/(?:passwd|shadow|sudoers)", "^/proc/", "^/sys/", "\\.aws/credentials"]]
          source: scan
      - E:  # confidence: 0.50
          pattern: arg_blacklist
          args: [edit_file, path, ["\\.\\./", "~/\\.ssh/", "^/etc/(?:passwd|shadow|sudoers)", "^/proc/", "^/sys/", "\\.aws/credentials"]]
          source: scan
      - E:  # confidence: 0.45 — review recommended
          pattern: arg_length_limit
          args: [user_instruction, message, 100000]
          source: scan
      - E:  # confidence: 0.45 — review recommended
          pattern: arg_length_limit
          args: [execute_sql, query, 1000]
          source: scan
      - E:  # confidence: 0.45 — review recommended
          pattern: arg_length_limit
          args: [escalate_to_human, summary, 5000]
          source: scan
      - E:  # confidence: 0.45 — review recommended
          pattern: arg_length_limit
          args: [generate_status_report, summary, 5000]
          source: scan
