version: 1

# Parse-time LLM (used by `sponsio scan` to turn code/docs into
# contracts).  Offline & one-shot — favour accuracy over latency.
extractor:
  provider: gemini
  model: gemini-2.5-flash
  api_key: ${GOOGLE_API_KEY}

# Runtime sto-judge (evaluates stochastic atoms like `injection_free`)
# on the agent's hot path.  Favour cheap+fast model; fault tolerance
# matters because LLM outages must NOT cascade into agent outages.
judge:
  provider: gemini
  model: gemini-2.5-flash
  api_key: ${GOOGLE_API_KEY}
  fallback_mode: allow  # allow|deny|skip on judge failure
  circuit_breaker: true

defaults:
  mode: enforce  # observe|enforce — observe = shadow (safe default)

tools:
  - name: list_snapshots
    description: "List backup snapshots under a directory."
    params: "root: str"
  - name: estimate_savings
    description: "Estimate the monthly storage cost for a snapshot glob."
    params: "pattern: str"
  - name: delete_snapshot
    description: "Delete a snapshot by path (requires age_days for audit)."
    params: "path: str, age_days: int"
  - name: generate_report
    description: "Write the cost-optimization report."
    params: "output_path: str"
  - name: list_snapshots
    description: "List backup snapshots under a directory."
    params: "root: str"
  - name: estimate_savings
    description: "Estimate the monthly storage cost for a snapshot glob."
    params: "pattern: str"
  - name: delete_snapshot
    description: "Delete a snapshot by path (requires age_days for audit)."
    params: "path: str, age_days: int"
  - name: generate_report
    description: "Write the cost-optimization report to a file."
    params: "output_path: str"

agents:
  agent:
    # Auto-selected contract packs.  Each pack ships a curated set
    # of rules; use `overrides:` below to disable individual ones
    # without forking the pack.
    include:
      - sponsio:core/universal  # universal: applies to every LLM agent

    contracts:
      - E:  # review
          pattern: idempotent
          args: [delete_snapshot]
          source: scan
      - E:  # review
          pattern: arg_blacklist
          args: [delete_snapshot, path, ["\\.\\./", "~/\\.ssh/", "^/etc/(?:passwd|shadow|sudoers)", "^/proc/", "^/sys/", "\\.aws/credentials"]]
          source: scan
