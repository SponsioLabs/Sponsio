version: 1

# No LLM configured — `sponsio scan` currently runs AST + starter-pack
# only.  To enable richer inference, uncomment and fill in:
# extractor:
#   provider: gemini   # 1500 req/day free tier
#   api_key: ${GOOGLE_API_KEY}

# Runtime sto-judge (evaluates stochastic atoms like `injection_free`)
# on the agent's hot path.  Favour cheap+fast model; fault tolerance
# matters because LLM outages must NOT cascade into agent outages.
judge:
  fallback_mode: allow  # allow|deny|skip on judge failure
  circuit_breaker: true

defaults:
  mode: observe  # observe|enforce — observe = shadow (safe default)

tools:
  - name: list_invoices
    description: "List invoices waiting to be paid for a fiscal quarter."
    params: "quarter: str"
  - name: read_invoice
    description: "Read a single invoice JSON."
    params: "id: str"
  - name: check_vendor_history
    description: "Return the vendor's prior transaction history."
    params: "vendor: str"
  - name: wire_transfer
    description: "Wire funds to a vendor."
    params: "to: str, amount: int, invoice_id: str"
  - name: generate_report
    description: "Write the quarterly AP report."
    params: "output_path: str"

agents:
  agent:
    # Auto-selected contract packs.  Each pack ships a curated set
    # of rules; use `overrides:` below to disable individual ones
    # without forking the pack.
    include:
      - sponsio:core/universal  # universal: applies to every LLM agent

    contracts:
      - E:  # confidence: 0.50
          pattern: idempotent
          args: [read_invoice]
          source: scan
      - E:  # confidence: 0.50
          pattern: idempotent
          args: [wire_transfer]
          source: scan

      - E:  # confidence: 0.60
          pattern: tool_allowlist
          args: [[check_vendor_history, generate_report, list_invoices, read_invoice, wire_transfer]]
          source: scan
      - E:  # confidence: 0.50
          pattern: loop_detection
          args: [check_vendor_history, 5]
          source: scan
      - E:  # confidence: 0.50
          pattern: loop_detection
          args: [generate_report, 5]
          source: scan
      - E:  # confidence: 0.50
          pattern: loop_detection
          args: [list_invoices, 5]
          source: scan
      - E:  # confidence: 0.50
          pattern: loop_detection
          args: [read_invoice, 5]
          source: scan
      - E:  # confidence: 0.50
          pattern: loop_detection
          args: [wire_transfer, 5]
          source: scan
      - E:  # confidence: 0.50
          pattern: token_budget
          args: [100000, total]
          source: scan
      - E:  # confidence: 0.50
          pattern: delegation_depth_limit
          args: [3]
          source: scan
