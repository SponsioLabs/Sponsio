# Example Sponsio contract configuration
version: "1"

agents:
  customer_bot:
    contracts:
      - A: "tool `check_policy` must precede `issue_refund`"
        E: "tool `issue_refund` at most 1 times"
      - E: "response must not contain PII"

  coding_agent:
    contracts:
      - E: "tool `confirm_with_user` must precede `execute_sql`"
      - E: "tool `execute_sql` at most 2 times"
