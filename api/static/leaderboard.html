<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline'">
<title>Sponsio Safety Leaderboard</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --orange: #db6d28;
    --red: #f85149;
    --brightgreen: #2ea043;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .container { max-width: 1080px; margin: 0 auto; padding: 32px 24px; }

  /* Header */
  .header { text-align: center; margin-bottom: 32px; }
  .header h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
  .header .sub { color: var(--text-muted); font-size: 16px; }
  .header .sub span { color: var(--accent); font-weight: 600; }

  /* Stats bar */
  .stats-bar {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center; margin-bottom: 24px;
  }
  .pill {
    display: inline-block; padding: 4px 12px; border-radius: 12px;
    font-size: 13px; font-weight: 600;
  }
  .pill-aplus { background: var(--brightgreen); color: #fff; }
  .pill-a     { background: var(--green); color: #fff; }
  .pill-b     { background: #538d4e; color: #fff; }
  .pill-c     { background: var(--yellow); color: #000; }
  .pill-d     { background: var(--orange); color: #fff; }
  .pill-f     { background: var(--red); color: #fff; }

  /* Filters */
  .filters {
    display: flex; gap: 12px; margin-bottom: 20px;
    align-items: center; flex-wrap: wrap;
  }
  .filter-group { display: flex; gap: 4px; }
  .filter-btn {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text-muted); padding: 6px 14px; border-radius: 6px;
    cursor: pointer; font-size: 13px; transition: all .15s;
  }
  .filter-btn:hover { border-color: var(--text-muted); color: var(--text); }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  select.filter-select {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 6px 10px; border-radius: 6px;
    font-size: 13px; cursor: pointer;
  }

  /* Table */
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left; padding: 10px 12px; font-size: 12px;
    text-transform: uppercase; color: var(--text-muted); letter-spacing: .5px;
    border-bottom: 1px solid var(--border);
  }
  tbody td {
    padding: 14px 12px; border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tbody tr:hover { background: rgba(88,166,255,.06); }
  .row-a   { border-left: 3px solid var(--green); }
  .row-b   { border-left: 3px solid #538d4e; }
  .row-c   { border-left: 3px solid var(--yellow); }
  .row-d   { border-left: 3px solid var(--orange); }
  .row-f   { border-left: 3px solid var(--red); }

  .rank { font-size: 18px; font-weight: 700; color: var(--text-muted); width: 48px; }
  .rank-1 { color: #f0c000; }
  .rank-2 { color: #c0c0c0; }
  .rank-3 { color: #cd7f32; }

  .agent-name { font-weight: 600; font-size: 15px; }
  .agent-desc { color: var(--text-muted); font-size: 13px; margin-top: 2px; }
  .fw-badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text-muted);
  }
  .score-num { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .grade-badge {
    display: inline-block; padding: 2px 10px; border-radius: 4px;
    font-size: 14px; font-weight: 700;
  }
  .grade-aplus, .grade-a { background: var(--green); color: #fff; }
  .grade-b { background: #538d4e; color: #fff; }
  .grade-c { background: var(--yellow); color: #000; }
  .grade-d { background: var(--orange); color: #fff; }
  .grade-f { background: var(--red); color: #fff; }

  .ts { color: var(--text-muted); font-size: 13px; }
  .empty-state {
    text-align: center; padding: 64px 0; color: var(--text-muted);
    font-size: 16px;
  }

  /* Footer */
  footer {
    margin-top: 48px; padding-top: 24px;
    border-top: 1px solid var(--border); text-align: center;
    color: var(--text-muted); font-size: 13px;
  }
  footer .code-block {
    display: inline-block; background: var(--surface);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 16px; margin: 12px 0; font-family: monospace;
    font-size: 14px; color: var(--text);
  }
  footer p { margin: 8px 0; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Sponsio Safety Leaderboard</h1>
    <div class="sub" id="header-sub">Loading...</div>
  </div>
  <div class="stats-bar" id="stats-bar"></div>

  <div class="filters">
    <div class="filter-group" id="period-filters">
      <button class="filter-btn active" data-period="all">All</button>
      <button class="filter-btn" data-period="today">Today</button>
      <button class="filter-btn" data-period="week">This Week</button>
    </div>
    <select class="filter-select" id="framework-filter">
      <option value="all">All Frameworks</option>
    </select>
  </div>

  <table>
    <thead>
      <tr>
        <th>Rank</th>
        <th>Agent</th>
        <th>Framework</th>
        <th>Score</th>
        <th>Grade</th>
        <th>Submitted</th>
      </tr>
    </thead>
    <tbody id="leaderboard-body">
      <tr><td colspan="6" class="empty-state">Loading...</td></tr>
    </tbody>
  </table>

  <footer>
    <p><strong>Submit your agent:</strong></p>
    <div class="code-block">pip install sponsio &amp;&amp; sponsio score --name your_agent</div>
    <p>
      <a href="https://github.com/SponsioLabs/Sponsio">Star us on GitHub</a>
    </p>
    <p>Scoring methodology informed by analysis of 50+ MCP CVEs (Jan&ndash;Apr 2026)</p>
  </footer>
</div>

<script>
const API = window.location.origin;
let currentPeriod = 'all';
let currentFramework = 'all';

function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  return days + 'd ago';
}

function gradeClass(g) {
  const key = g.replace('+', 'plus').toLowerCase();
  return 'grade-' + key;
}

function rowClass(g) {
  if (g === 'A+' || g === 'A') return 'row-a';
  if (g === 'B') return 'row-b';
  if (g === 'C') return 'row-c';
  if (g === 'D') return 'row-d';
  return 'row-f';
}

function rankClass(r) {
  if (r <= 3) return ' rank-' + r;
  return '';
}

function pillClass(g) {
  const map = {'A+':'pill-aplus','A':'pill-a','B':'pill-b','C':'pill-c','D':'pill-d','F':'pill-f'};
  return map[g] || 'pill-f';
}

async function loadStats() {
  try {
    const r = await fetch(API + '/api/leaderboard/stats');
    const s = await r.json();
    document.getElementById('header-sub').innerHTML =
      '<span>' + s.total_submissions + '</span> submissions &middot; average score <span>' +
      s.average_score + '</span>';

    const bar = document.getElementById('stats-bar');
    bar.innerHTML = '';
    const order = ['A+','A','B','C','D','F'];
    for (const g of order) {
      const cnt = s.grade_distribution[g] || 0;
      if (cnt > 0) {
        bar.innerHTML += '<span class="pill ' + pillClass(g) + '">' + g + ': ' + cnt + '</span>';
      }
    }

    // Populate framework filter
    const sel = document.getElementById('framework-filter');
    const opts = sel.querySelectorAll('option:not(:first-child)');
    opts.forEach(o => o.remove());
    for (const [fw, cnt] of Object.entries(s.framework_distribution)) {
      const opt = document.createElement('option');
      opt.value = fw;
      opt.textContent = fw + ' (' + cnt + ')';
      sel.appendChild(opt);
    }
  } catch(e) {
    document.getElementById('header-sub').textContent = 'Could not load stats';
  }
}

async function loadLeaderboard() {
  const params = new URLSearchParams({period: currentPeriod});
  if (currentFramework !== 'all') params.set('framework', currentFramework);

  try {
    const r = await fetch(API + '/api/leaderboard?' + params);
    const data = await r.json();
    const tbody = document.getElementById('leaderboard-body');

    if (data.entries.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No public submissions yet. Be the first!</td></tr>';
      return;
    }

    tbody.innerHTML = data.entries.map(e => `
      <tr class="${rowClass(e.grade)}">
        <td class="rank${rankClass(e.rank)}">#${e.rank}</td>
        <td>
          <div class="agent-name">${esc(e.display_name)}</div>
          ${e.description ? '<div class="agent-desc">' + esc(e.description) + '</div>' : ''}
        </td>
        <td>${e.framework ? '<span class="fw-badge">' + esc(e.framework) + '</span>' : '<span class="fw-badge">-</span>'}</td>
        <td class="score-num">${e.score}</td>
        <td><span class="grade-badge ${gradeClass(e.grade)}">${esc(e.grade)}</span></td>
        <td class="ts">${timeAgo(e.timestamp)}</td>
      </tr>
    `).join('');
  } catch(e) {
    document.getElementById('leaderboard-body').innerHTML =
      '<tr><td colspan="6" class="empty-state">Failed to load leaderboard</td></tr>';
  }
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Period filter buttons
document.getElementById('period-filters').addEventListener('click', e => {
  if (!e.target.dataset.period) return;
  currentPeriod = e.target.dataset.period;
  document.querySelectorAll('#period-filters .filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  loadLeaderboard();
});

// Framework filter
document.getElementById('framework-filter').addEventListener('change', e => {
  currentFramework = e.target.value;
  loadLeaderboard();
});

// Initial load + auto-refresh
loadStats();
loadLeaderboard();
setInterval(() => { loadStats(); loadLeaderboard(); }, 30000);
</script>
</body>
</html>
