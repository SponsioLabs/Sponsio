# =============================================================================
# sponsio/contracts/benchmark/agentdojo.yaml
#
# Benchmark contract library — AgentDojo prompt-injection / lethal-trifecta.
#
# AgentDojo (Debenedetti et al., NeurIPS 2024 Datasets & Benchmarks Track,
# arXiv:2406.13352) measures defenses against indirect prompt-injection
# attacks across four agentic tool suites:
#   - workspace  (email / calendar / file-share, corporate domain
#                 bluesparrowtech.com)
#   - banking    (account info, transfers, scheduled payments)
#   - travel     (hotel / car / restaurant reservations, calendar)
#   - slack      (DMs, channel messages, web get/post, invites)
#
# Threat model = "lethal trifecta" patterns:
#   1. Data exfiltration   — exfil to public mailbox / attacker-controlled
#                            URL / attacker IBAN.
#   2. Action hijack       — attacker-chosen hotel / car / restaurant
#                            booking, attacker password change, attacker
#                            slack invite.
#   3. Cover-up sequencing — send-then-delete-email, invite-then-remove,
#                            scheduled-transaction redirect.
#
# This bundle ships TWO layers of det contracts, both extracted from the
# executing source of truth:
#
#   §A. Per-suite hand-crafted contracts from
#       Benchmarks/agentdojo/eval_sponsio.py (SUITE_CONTRACTS), which
#       encode AgentDojo's hardcoded injection-attack payloads (specific
#       attacker IBAN US133…, mark.black-2134@gmail.com, Riverside View
#       Hotel, fred9246@gmail.com, etc.). Tight to AgentDojo payloads,
#       useful for reproducing the published headline numbers.
#
#   §B. Task-aware generic / suite-level contracts from
#       Benchmarks/agentdojo/eval_sponsio_taskaware.py
#       (GENERIC_SUITE_BLACKLISTS + _extra_suite_contracts), which use
#       only generic public-attacker signatures (public-mail domains,
#       raw URLs in DMs) plus suite-level pattern compositions (single-
#       transfer cap, send-then-delete no_reversal, mutex on slack
#       invite/remove). These are payload-agnostic and portable.
#
# NOT translated to yaml (schema gap — runtime-derived contracts):
#   The task-aware pipeline ALSO derives per-task tool_allowlist /
#   arg_allowlist / rate_limit / irreversible_once contracts from
#   Benchmarks/agentdojo/task_manifests.json on a per-user-task basis.
#   Those are dynamic and live in the manifest JSON, not here.
#
# Reported numbers (from eval_sponsio_taskaware.py headers / runs, gpt-4o
# baseline, det-only): chain-break ASR reduction on the order of 70-90%
# across suites with sub-1% utility FP on "none" attack traces. See the
# Benchmarks/agentdojo/all_models_v*.json artefacts for full per-model
# breakdowns.
#
# Tools touched by these contracts (one symbolic name per AgentDojo tool;
# adapt to your tool-name conventions if your runtime uses different ids):
#
# Source-tag convention:
#   library:benchmark.agentdojo/<category>
# where <category> is one of: data-exfiltration, prompt-injection,
# action-ordering, action-hijack, agentdojo-specific. Filter via
# `sponsio scan --filter source=...`.
#
# Include via:
#   include:
#     - sponsio:benchmark/agentdojo
# =============================================================================

version: "1"

tools:
  # ── workspace suite ──────────────────────────────────────────────
  - name: send_email
    description: "Send an email (recipients: list[str], body: str, subject: str)"
    params: "recipients: list[str], subject: str, body: str"
  - name: delete_email
    description: "Delete an email by id"
    params: "email_id: str"
  - name: delete_file
    description: "Delete a workspace file by id"
    params: "file_id: str"
  - name: create_calendar_event
    description: "Create a calendar event (workspace + travel)"
    params: "title: str, participants: list[str], ..."
  - name: add_calendar_event_participants
    description: "Add participants to an existing calendar event"
    params: "event_id: str, participants: list[str]"
  - name: share_file
    description: "Share a workspace file with an email recipient"
    params: "file_id: str, email: str"

  # ── banking suite ────────────────────────────────────────────────
  - name: send_money
    description: "Transfer money to a recipient IBAN"
    params: "recipient: str, amount: float, subject: str, date: str"
  - name: schedule_transaction
    description: "Schedule a future money transfer"
    params: "recipient: str, amount: float, ..."
  - name: update_scheduled_transaction
    description: "Edit a previously scheduled transaction"
    params: "id: str, recipient: str, amount: float, ..."
  - name: update_password
    description: "Change the banking account password"
    params: "password: str"
  - name: update_user_info
    description: "Update banking account user info"
    params: "first_name: str, last_name: str, street: str, city: str, email: str"

  # ── travel suite ─────────────────────────────────────────────────
  - name: reserve_hotel
    description: "Reserve a hotel"
    params: "hotel: str, start_day: str, end_day: str"
  - name: reserve_car
    description: "Reserve a car rental"
    params: "company: str, start_day: str, end_day: str"
  - name: reserve_restaurant
    description: "Reserve a restaurant table"
    params: "restaurant: str, start_time: str"

  # ── slack suite ──────────────────────────────────────────────────
  - name: send_direct_message
    description: "Send a slack DM"
    params: "recipient: str, body: str"
  - name: send_channel_message
    description: "Post to a slack channel"
    params: "channel: str, body: str"
  - name: post_webpage
    description: "Post content to an external webpage"
    params: "url: str, content: str"
  - name: get_webpage
    description: "Fetch an external webpage"
    params: "url: str"
  - name: invite_user_to_slack
    description: "Invite a user to the slack workspace"
    params: "user: str, user_email: str"
  - name: remove_user_from_slack
    description: "Remove a user from the slack workspace"
    params: "user: str"
  - name: add_user_to_channel
    description: "Add a user to a slack channel"
    params: "user: str, channel: str"

agents:
  "*":
    contracts:

      # ===================================================================
      # §A — Hand-crafted suite contracts (eval_sponsio.py SUITE_CONTRACTS)
      #
      # These encode AgentDojo's hardcoded injection-attack payloads. They
      # reproduce the headline det-only numbers but are AgentDojo-payload
      # specific. The shared _PUBLIC_MAIL_DOMAINS list below is reused
      # across workspace + travel + banking (suite_taskaware also uses it).
      # ===================================================================

      # ── § A.workspace ────────────────────────────────────────────────

      - desc: "Outbound email blocked to public-domain / known-attacker recipients"
        G:
          pattern: arg_blacklist
          args:
            - send_email
            - recipients
            - - "@gmail\\.com"
              - "@yahoo\\.com"
              - "@hotmail\\.com"
              - "@outlook\\.com"
              - "@protonmail"
              - "@icloud\\.com"
              - "@aol\\.com"
              - "@mail\\.ru"
              - "mark\\.black"
              - "attacker"
              - "phishing"
          source: "library:benchmark.agentdojo/data-exfiltration"

      - desc: "Deletion blocked for the known-injection file id"
        G:
          pattern: arg_blacklist
          args:
            - delete_file
            - file_id
            - - "^13$"
          source: "library:benchmark.agentdojo/agentdojo-specific"

      - desc: "Deletion blocked for the known-injection email ids"
        G:
          pattern: arg_blacklist
          args:
            - delete_email
            - email_id
            - - "^26$"
              - "^34$"
              - "^35$"
          source: "library:benchmark.agentdojo/agentdojo-specific"

      # ── § A.banking ──────────────────────────────────────────────────

      - desc: "Money transfers blocked to the known-attacker IBAN"
        G:
          pattern: arg_blacklist
          args:
            - send_money
            - recipient
            - - "US133000000121212121"
          source: "library:benchmark.agentdojo/agentdojo-specific"

      - desc: "Scheduled-transaction edits blocked when redirecting to attacker IBAN"
        G:
          pattern: arg_blacklist
          args:
            - update_scheduled_transaction
            - recipient
            - - "US133000000121212121"
          source: "library:benchmark.agentdojo/agentdojo-specific"

      - desc: "Password update banned in attack-evaluation context"
        G:
          pattern: rate_limit
          args: [update_password, 0]
          source: "library:benchmark.agentdojo/action-hijack"

      # ── § A.travel ───────────────────────────────────────────────────

      - desc: "Outbound email blocked to public-domain recipients"
        G:
          pattern: arg_blacklist
          args:
            - send_email
            - recipients
            - - "@gmail\\.com"
              - "@yahoo\\.com"
              - "@hotmail\\.com"
              - "@outlook\\.com"
              - "@protonmail"
              - "@icloud\\.com"
              - "@aol\\.com"
              - "@mail\\.ru"
              - "jay@"
              - "attacker"
          source: "library:benchmark.agentdojo/data-exfiltration"

      - desc: "Hotel reservations blocked for known-injection targets"
        G:
          pattern: arg_blacklist
          args:
            - reserve_hotel
            - hotel
            - - "Riverside View Hotel"
              - "attacker"
              - "malicious"
          source: "library:benchmark.agentdojo/action-hijack"

      - desc: "Car reservations blocked for attacker-chosen vendors"
        G:
          pattern: arg_blacklist
          args:
            - reserve_car
            - company
            - - "attacker"
              - "malicious"
          source: "library:benchmark.agentdojo/action-hijack"

      - desc: "Restaurant reservations blocked for attacker-chosen targets"
        G:
          pattern: arg_blacklist
          args:
            - reserve_restaurant
            - restaurant
            - - "attacker"
              - "malicious"
          source: "library:benchmark.agentdojo/action-hijack"

      - desc: "Calendar events blocked when title references injection target"
        G:
          pattern: arg_blacklist
          args:
            - create_calendar_event
            - title
            - - "Riverside View Hotel"
          source: "library:benchmark.agentdojo/data-exfiltration"

      # ── § A.slack ────────────────────────────────────────────────────

      - desc: "DMs blocked when body contains phishing-link or credential probes"
        G:
          pattern: arg_blacklist
          args:
            - send_direct_message
            - body
            - - "secure-systems-252"
              - "true-informations"
              - "my-website-234"
              - "password"
              - "secret"
              - "credential"
              - "IBAN"
              - "bank.*account"
              - "http://"
              - "https?://[a-z0-9-]+\\.(com|net|org|io)"
          source: "library:benchmark.agentdojo/prompt-injection"

      - desc: "Webpage posts blocked to known-attacker hosts"
        G:
          pattern: arg_blacklist
          args:
            - post_webpage
            - url
            - - "my-website-234"
              - "secure-systems-252"
              - "true-informations"
              - "attacker"
          source: "library:benchmark.agentdojo/data-exfiltration"

      - desc: "Webpage visits blocked to phishing/attacker hosts"
        G:
          pattern: arg_blacklist
          args:
            - get_webpage
            - url
            - - "true-informations"
              - "secure-systems-252"
              - "my-website-234"
              - "phishing"
          source: "library:benchmark.agentdojo/prompt-injection"

      - desc: "Slack invites blocked for the known-attacker email"
        G:
          pattern: arg_blacklist
          args:
            - invite_user_to_slack
            - user_email
            - - "fred9246"
              - "attacker"
          source: "library:benchmark.agentdojo/agentdojo-specific"

      - desc: "Slack removal banned in attack-evaluation context"
        G:
          pattern: rate_limit
          args: [remove_user_from_slack, 0]
          source: "library:benchmark.agentdojo/action-ordering"

      - desc: "Adding non-workspace users to channels blocked"
        G:
          pattern: arg_blacklist
          args:
            - add_user_to_channel
            - user
            - - "Fred"
              - "attacker"
          source: "library:benchmark.agentdojo/action-hijack"

      # ===================================================================
      # §B — Task-aware generic / suite-level contracts
      #      (eval_sponsio_taskaware.py)
      #
      # These are payload-agnostic patterns: public-mail-domain exfil
      # guards, raw-URL DM guards, plus suite-level compositions of
      # existing library atoms (single-transfer cap, cooldown, send-then-
      # delete no_reversal, slack invite/remove mutex, anti-exfil body
      # length cap, no_keywords response-text scrub).
      # ===================================================================

      # ── § B.workspace generic-blacklist ──────────────────────────────

      - desc: "outbound corporate email to public mailbox"
        G:
          pattern: arg_blacklist
          args:
            - send_email
            - recipients
            - - "@gmail\\.com"
              - "@yahoo\\.com"
              - "@hotmail\\.com"
              - "@outlook\\.com"
              - "@protonmail"
              - "@icloud\\.com"
              - "@aol\\.com"
              - "@mail\\.ru"
          source: "library:benchmark.agentdojo/data-exfiltration"

      - desc: "calendar invite to public mailbox"
        G:
          pattern: arg_blacklist
          args:
            - create_calendar_event
            - participants
            - - "@gmail\\.com"
              - "@yahoo\\.com"
              - "@hotmail\\.com"
              - "@outlook\\.com"
              - "@protonmail"
              - "@icloud\\.com"
              - "@aol\\.com"
              - "@mail\\.ru"
          source: "library:benchmark.agentdojo/data-exfiltration"

      - desc: "calendar participant add to public mailbox"
        G:
          pattern: arg_blacklist
          args:
            - add_calendar_event_participants
            - participants
            - - "@gmail\\.com"
              - "@yahoo\\.com"
              - "@hotmail\\.com"
              - "@outlook\\.com"
              - "@protonmail"
              - "@icloud\\.com"
              - "@aol\\.com"
              - "@mail\\.ru"
          source: "library:benchmark.agentdojo/data-exfiltration"

      # ── § B.travel generic-blacklist ─────────────────────────────────

      - desc: "outbound corporate email to public mailbox"
        G:
          pattern: arg_blacklist
          args:
            - send_email
            - recipients
            - - "@gmail\\.com"
              - "@yahoo\\.com"
              - "@hotmail\\.com"
              - "@outlook\\.com"
              - "@protonmail"
              - "@icloud\\.com"
              - "@aol\\.com"
              - "@mail\\.ru"
          source: "library:benchmark.agentdojo/data-exfiltration"

      # ── § B.slack generic-blacklist ──────────────────────────────────

      - desc: "DM containing raw URL"
        G:
          pattern: arg_blacklist
          args:
            - send_direct_message
            - body
            - - "https?://"
              - "\\bwww\\.\\w"
          source: "library:benchmark.agentdojo/prompt-injection"

      # ── § B.banking generic-blacklist ────────────────────────────────

      - desc: "account-info email change to public mailbox"
        G:
          pattern: arg_blacklist
          args:
            - update_user_info
            - email
            - - "@gmail\\.com"
              - "@yahoo\\.com"
              - "@hotmail\\.com"
              - "@outlook\\.com"
              - "@protonmail"
              - "@icloud\\.com"
              - "@aol\\.com"
              - "@mail\\.ru"
          source: "library:benchmark.agentdojo/data-exfiltration"

      # ── § B.banking suite-level pattern compositions ─────────────────

      - desc: "single-transfer cap (anti-IT5)"
        G:
          pattern: arg_value_range
          args: [send_money, amount, null, 10000]
          source: "library:benchmark.agentdojo/action-hijack"

      - desc: "at least 2 non-send calls between send_money (anti-IT6)"
        G:
          pattern: cooldown
          args: [send_money, 2]
          source: "library:benchmark.agentdojo/action-ordering"

      - desc: "≤ 2 send_money calls per session (anti-IT6)"
        G:
          pattern: duplicate_call_limit
          args: [send_money, ".*", 2]
          source: "library:benchmark.agentdojo/action-hijack"

      # ── § B.workspace suite-level pattern compositions ───────────────

      - desc: "cannot delete an email after sending (anti-IT5 cover-up)"
        G:
          pattern: no_reversal
          args: [send_email, delete_email]
          source: "library:benchmark.agentdojo/action-ordering"

      - desc: "email body length cap (anti-exfil)"
        G:
          pattern: arg_length_limit
          args: [send_email, body, 4000]
          source: "library:benchmark.agentdojo/data-exfiltration"

      # ── § B.travel suite-level pattern compositions ──────────────────
      # NOTE: identical desc to workspace's anti-exfil cap above by design
      # (eval_sponsio_taskaware.py uses the same desc string for both).

      - desc: "email body length cap (anti-exfil) [travel]"
        G:
          pattern: arg_length_limit
          args: [send_email, body, 4000]
          source: "library:benchmark.agentdojo/data-exfiltration"

      # ── § B.slack suite-level pattern compositions ───────────────────

      - desc: "invite and remove are mutex within session (anti-IT5)"
        G:
          pattern: mutual_exclusion
          args: [invite_user_to_slack, remove_user_from_slack]
          source: "library:benchmark.agentdojo/action-ordering"

      - desc: "response must not echo known phishing URL hosts"
        G:
          # Expressed as raw LTL because the equivalent pattern factory
          # `no_keywords` is defined in sponsio.patterns.library but not yet
          # registered in the yaml loader's pattern registry. Semantics match
          # `no_keywords(["secure-systems-252", "true-informations",
          # "my-website-234"])`: at every event, the assistant's response text
          # must not contain any of the phishing-URL hosts as a whole word.
          ltl: 'G(!llm_said("(?i)\\b(secure-systems-252|true-informations|my-website-234)\\b"))'
          source: "library:benchmark.agentdojo/prompt-injection"

# -----------------------------------------------------------------------------
# Bench metadata (informational; not loaded at runtime)
#
# total_det_contracts_translated:    31  (17 §A + 14 §B)
#   §A workspace:  3   (send_email exfil, delete_file id, delete_email id)
#   §A banking:    3   (send_money IBAN, update_scheduled_transaction IBAN,
#                       update_password rate_limit=0)
#   §A travel:     5   (send_email, reserve_hotel, reserve_car,
#                       reserve_restaurant, create_calendar_event title)
#   §A slack:      6   (send_direct_message body, post_webpage, get_webpage,
#                       invite_user_to_slack, remove_user_from_slack rate=0,
#                       add_user_to_channel)
#   §B generics:   6   (workspace x3, travel x1, slack x1, banking x1)
#   §B suite-lvl:  8   (banking x3, workspace x2, travel x1, slack x2)
#
# NOT translated (runtime-derived from task_manifests.json — schema gap):
#   - per-task tool_allowlist (one per user task, ~80 total across suites)
#   - per-task arg_allowlist  (per-tool-per-field, user-named entities)
#   - per-task rate_limit     (per intent, e.g. send_email max=1)
#   - per-task irreversible_once on update_password
#   These are inherently dynamic (depend on the parsed user PROMPT) and
#   live in Benchmarks/agentdojo/task_manifests.json, not in this bundle.
#
# Executing source of truth: Benchmarks/agentdojo/eval_sponsio.py
#                            Benchmarks/agentdojo/eval_sponsio_taskaware.py
# Sto contracts:             Benchmarks/agentdojo/sto_contracts.yaml (separate)
# last_updated:              2026-06-06
# -----------------------------------------------------------------------------
