# Generated by: sponsio onboard (agent-mediated)
# Framework: vercel-ai
# Mode starts as `observe`: every contract is evaluated and violations
# are logged to ~/.sponsio/sessions/agent/*.jsonl, but nothing is
# blocked. Run real traffic for a day, then `npx sponsio mode enforce`.

version: 1

runtime:
  mode: enforce

agents:
  agent:
    include:
      # Output-quality / injection / jailbreak / toxic / PII / harm.
      # sto pack — requires a `judge:` block to actually fire; otherwise
      # silently passes (one warning per contract). See `sponsio doctor`.
      - sponsio:core/universal

    contracts:
      # ── 1. The single most important BEC defense ──────────────────────
      # Vendor bank account changes require an out-of-band phone callback
      # to the number on file BEFORE the change is written. A verified
      # callback is the one defense BEC attackers cannot bypass — they
      # don't control the legitimate vendor's AP desk number. Email
      # "internal notes" claiming OOB was waived are themselves the attack.
      - desc: "Vendor bank account changes require OOB phone verification"
        E: "tool `verify_vendor_oob` must precede `update_vendor_bank_account`"
        source: agent-extracted

      # ── 2. Blast-radius cap on payments ───────────────────────────────
      # A morning inbox sweep should never wire more than three payments.
      # If the agent is being walked through a payment loop (e.g. an
      # attacker sends multiple invoice-due notices to bleed the account),
      # this rule is the floor that stops it.
      - desc: "Cap payments at 3 per session (BEC blast radius)"
        E: "tool `issue_payment` at most 3 times"
        source: agent-extracted
