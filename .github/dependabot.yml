version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/ts"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/ts/packages/sdk"
    schedule:
      interval: "weekly"
