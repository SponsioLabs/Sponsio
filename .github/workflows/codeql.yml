name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: ["python", "javascript-typescript"]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@865f5f5c36632f18690a3d569fa0a764f2da0c3e # v3
        with:
          languages: ${{ matrix.language }}
          # Custom config scopes analysis to first-party source and
          # excludes bundled / vendored / build-artifact trees (see
          # .github/codeql-config.yml for rationale).
          config-file: ./.github/codeql-config.yml
          # Skip the autobuild step entirely. Sponsio is a library —
          # CodeQL can analyse our Python / TS source statically
          # without ``pip install -e .[all]`` or ``npm install``.
          # Autobuild is what was timing out at the 2-minute mark
          # (npm trying to resolve every package.json including
          # bundled artifacts and the TS workspace, plus pip pulling
          # heavy optional deps like crewai / google-adk that have
          # large dep trees). ``build-mode: none`` makes the analysis
          # purely source-based, which is the right shape for a
          # library where the security signal lives in the code, not
          # in compile-time linkage.
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@865f5f5c36632f18690a3d569fa0a764f2da0c3e # v3
        with:
          category: "/language:${{ matrix.language }}"
