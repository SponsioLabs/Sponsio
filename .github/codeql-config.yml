name: "Sponsio CodeQL config"

# Scope CodeQL to first-party source. Without this, the analyzer
# discovers every package.json (including bundled / vendored
# artifacts under ``sponsio/plugin/openclaw_artifact/dist/`` and the
# built TS workspace under ``ts/packages/*/dist/``), tries to load
# each, and either OOMs the security-extended queries or times the
# step out at the 2-minute autobuild boundary. The exclusions below
# leave actual hand-written source (``sponsio/`` Python,
# ``ts/packages/sdk/src/``, ``ts/packages/scanner/src/``,
# ``web/src/``) in scope while skipping generated / bundled / vendored
# trees that don't carry security signal anyway.

paths:
  # First-party Python (everything under sponsio/).
  - sponsio
  - tests
  - scripts
  # First-party TypeScript / TSX source.
  - ts/packages/sdk/src
  - ts/packages/scanner/src
  - web/src
  - plugins/sponsio-claude-code/libraries
  - plugins/sponsio-openclaw/src
  - plugins/sponsio-openclaw/test

paths-ignore:
  # Bundled OpenClaw artifact — re-built by ``scripts/sync_openclaw_artifact.py``
  # from ``plugins/sponsio-openclaw/`` into the Python wheel. Analysing
  # the transpiled output in addition to the canonical source double-
  # counts findings and triggers false-positives on the minified shape.
  - sponsio/plugin/openclaw_artifact

  # Build outputs / vendored deps (generated, not hand-authored).
  - "**/dist"
  - "**/build"
  - "**/.next"
  - "**/node_modules"
  - "**/__pycache__"
  - "**/*.egg-info"
  - .venv
  - .venv-*
  - venv
  - .pytest_cache
  - .ruff_cache

  # Test fixtures / generated trace files that intentionally include
  # dangerous-looking strings (``rm -rf``, ``DROP TABLE``, ``curl |
  # bash``, …) as deny-pack regression cases. Analysing them as if
  # they were live code surfaces dozens of "would execute shell"
  # findings that are actually documenting attacks Sponsio blocks.
  - examples/eval/traces
  - tests/fixtures
  - tests/cross_language

queries:
  # Default suite is enough; ``security-extended`` adds many slow
  # "experimental" queries that account for most of the 2-minute
  # autobuild stalls without giving us actionable findings on a
  # contract-runtime codebase. Reach for ``security-extended`` when
  # we ship a binary that handles untrusted user input directly.
  - uses: security-and-quality
